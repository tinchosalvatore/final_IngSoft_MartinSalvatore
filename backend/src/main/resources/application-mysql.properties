# === Perfil MySQL 8.4 (per spec) ===
# Activar: ./mvnw spring-boot:run -Dspring-boot.run.profiles=mysql
# Requiere: CREATE DATABASE umbook; y usuario/clave abajo.

spring.datasource.url=jdbc:mysql://localhost:3306/umbook?createDatabaseIfNotExist=true&serverTimezone=UTC
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=root
spring.datasource.password=root

spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

spring.h2.console.enabled=false
