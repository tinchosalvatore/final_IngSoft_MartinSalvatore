<div class="toast-stack">
  <div class="toast" *ngFor="let t of toasts" (click)="alClickear(t)"
       [class.cumple]="t.tipo === 'CUMPLEANOS'" [class.error]="t.tipo === 'ERROR'">
    <span class="icono"><app-icon [name]="icono(t.tipo)" [size]="22" /></span>
    <div class="cuerpo">
      <strong>{{ titulo(t.tipo) }}</strong>
      <span class="msg">{{ t.mensaje }}</span>
    </div>
    <button class="cerrar" (click)="cerrar(t.uid); $event.stopPropagation()">&times;</button>
  </div>
</div>
