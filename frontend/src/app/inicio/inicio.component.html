<section class="inicio">
  <h1>UM-Book</h1>
  <p class="sub">Inicia sesion en tu cuenta</p>

  <form #f="ngForm" (ngSubmit)="iniciarSesion()" class="form">
    <label>Email
      <input name="email" type="email" [(ngModel)]="email" required />
    </label>

    <label>Contrasena
      <input name="contrasena" type="password" [(ngModel)]="contrasena" required />
    </label>

    <button type="submit" [disabled]="enviando || f.invalid">
      {{ enviando ? 'Ingresando...' : 'Iniciar sesion' }}
    </button>
  </form>

  <p class="err" *ngIf="error">{{ error }}</p>

  <p class="alt">No tenes cuenta? <a routerLink="/registro">Crear cuenta</a></p>
</section>
