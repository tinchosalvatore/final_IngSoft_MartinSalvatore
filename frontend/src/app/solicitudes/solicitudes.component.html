<section class="solicitudes">
  <a routerLink="/" class="volver">&larr; Volver al inicio</a>
  <h1>Solicitudes de amistad</h1>

  <p *ngIf="aviso" class="aviso">{{ aviso }}</p>
  <p *ngIf="cargando" class="estado">Cargando...</p>

  <ul *ngIf="!cargando && solicitudes.length > 0" class="lista">
    <li *ngFor="let s of solicitudes" class="card">
      <div class="avatar">{{ s.remitenteNombre.charAt(0) }}</div>
      <div class="info">
        <strong>{{ s.remitenteNombre }}</strong>
        <span class="user">&#64;{{ s.remitenteUsuario }}</span>
      </div>
      <div class="acciones">
        <button class="aceptar" (click)="aceptar(s)">Aceptar</button>
        <button class="rechazar" (click)="rechazar(s)">Rechazar</button>
      </div>
    </li>
  </ul>

  <p *ngIf="!cargando && solicitudes.length === 0" class="estado">
    No tenes solicitudes pendientes.
  </p>
</section>
